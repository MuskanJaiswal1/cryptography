<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="icon" href="../static/favicon.ico" type="image/x-icon" /> -->
    <link
      rel="stylesheet"
      type="text/css"
      href="../static/styles/tailwind.min.css"
    />
    <link rel="stylesheet" type="text/css" href="../static/styles/theme.css" />
    <title>Download File!</title>
    <style>
      body {
        background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
        color: #f2ebe9;
        min-height: 100vh;
      }
      .page-shell {
        width: min(880px, 94vw);
      }
      .dashboard-card {
        background: rgba(30, 30, 50, 0.8);
        border: 1px solid rgba(100, 100, 150, 0.3);
        border-radius: 16px;
        padding: 28px;
        backdrop-filter: blur(6px);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25);
      }
      .form-input {
        width: 100%;
        background: rgba(15, 20, 35, 0.8);
        border: 1px solid rgba(100, 100, 150, 0.4);
        border-radius: 10px;
        padding: 10px 12px;
        color: #f2ebe9;
      }
      .form-input:focus {
        outline: none;
        border-color: #10b981;
        box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.25);
      }
      .btn {
        border-radius: 10px;
        padding: 10px 16px;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      }
      .btn-primary {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        border: 1px solid #10b981;
        color: #ffffff;
      }
      .btn-secondary {
        background: rgba(50, 55, 80, 0.7);
        border: 1px solid rgba(130, 140, 180, 0.5);
        color: #e5e7eb;
      }
      .hint-card {
        border: 1px dashed rgba(100, 100, 150, 0.4);
        border-radius: 10px;
        background: rgba(25, 30, 45, 0.5);
      }
      .error-box {
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.6);
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body class="app-page px-4 py-8 md:py-12">
    {% include '_navbar.html' %}
    <div class="page-shell mx-auto">
      <div class="text-center mb-6">
        <h1 class="text-3xl md:text-4xl lg:text-5xl font-bold">
          FILE<span class="text-blue-600">!</span>SECURE
        </h1>
        <h2 class="text-sm md:text-base text-gray-300 mt-1">
          Secure File Storage Using <span class="text-green-400">Hybrid Cryptography</span>
        </h2>
        <p class="text-xs text-gray-400 mt-2">Restore and decrypt using sender key</p>
      </div>

      <div class="dashboard-card">

        {% if error %}
        <div class="error-box">
          <p class="text-red-300 font-semibold">{{ error }}</p>
        </div>
        {% endif %}

        <form action="/download_data" method="POST" enctype="multipart/form-data" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold mb-2">Attach the key file to restore your data</label>
            <input type="file" name="file" required class="form-input" />
          </div>

          <div class="flex flex-col sm:flex-row gap-3 pt-2">
            <button type="submit" class="btn btn-primary">Restore File</button>
            <a href="/home" class="btn btn-secondary text-center">Back to Home</a>
          </div>
        </form>

        <div class="hint-card mt-6 p-3 text-sm text-gray-300">
          Do not have the key file? Ask the sender for the generated .pem key first.
        </div>
      </div>

      <div class="text-center mt-6 text-xs text-gray-500">
        FILE!SECURE - Secure File Restore Workflow
      </div>
    </div>
  </body>
</html>
